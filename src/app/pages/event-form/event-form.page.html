<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button [defaultHref]="'/trips/' + tripId"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ pageTitle }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="form-container">
    <ion-card class="form-card">
      <ion-card-content>
        <form (ngSubmit)="onSubmit()">
          <ion-item>
            <ion-label position="stacked">Title *</ion-label>
            <ion-input 
              type="text" 
              [(ngModel)]="form.title" 
              name="title"
              required>
            </ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">Type *</ion-label>
            <ion-select [(ngModel)]="form.type" name="type" placeholder="Select type">
              <ion-select-option *ngFor="let type of eventTypes" [value]="type.value">
                {{ type.label }}
              </ion-select-option>
            </ion-select>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">Date</ion-label>
            <ion-input 
              type="date" 
              [(ngModel)]="form.date" 
              name="date">
            </ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">Time</ion-label>
            <ion-input 
              type="time" 
              [(ngModel)]="form.time" 
              name="time">
            </ion-input>
          </ion-item>

          <ion-item>
            <ion-label position="stacked">Notes</ion-label>
            <ion-textarea 
              [(ngModel)]="form.notes" 
              name="notes"
              rows="3">
            </ion-textarea>
          </ion-item>

          <div class="costs-section">
            <h4>Cost</h4>

            <div class="cost-row">
              <ion-item class="single-cost-item">
                <ion-label position="stacked">Amount (€)</ion-label>
                <ion-input
                  type="number"
                  [(ngModel)]="costs[0].amount"
                  name="cost-amount"
                  min="0"
                  step="50">
                </ion-input>
              </ion-item>
            </div>
          </div>

          <div class="button-group">
            <ion-button type="button" fill="outline" (click)="onCancel()">
              Cancel
            </ion-button>
            <ion-button type="submit" fill="solid">
              {{ submitButtonText }}
            </ion-button>
          </div>
        </form>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
